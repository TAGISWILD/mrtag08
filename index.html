<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script>
    (function () {
      // GitHub username
      var GITHUB_USER = "TAGISWILD";

      // Current path on tagiswild.rest (e.g. "/repo-name" or "/repo-name/issues")
      var path = window.location.pathname || "/";

      // Build base GitHub URL
      var target;
      if (path === "/" || path === "") {
        // If user hits just tagiswild.rest, send to your GitHub profile
        target = "https://github.com/" + GITHUB_USER;
      } else {
        // Forward the path as-is
        target = "https://github.com/" + GITHUB_USER + path;
      }

      // Preserve query params and hash if present
      var search = window.location.search || "";
      var hash = window.location.hash || "";
      target += search + hash;

      // Perform the redirect
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting you to GitHub… If nothing happens, 
    <a id="manual-link" href="#">click here</a>.
  </p>

  <script>
    // Set manual link href in case JS runs but replace() is blocked
    (function () {
      var GITHUB_USER = "TAGISWILD";
      var path = window.location.pathname || "/";
      var target = (path === "/" || path === "")
        ? "https://github.com/" + GITHUB_USER
        : "https://github.com/" + GITHUB_USER + path;
      target += (window.location.search || "") + (window.location.hash || "");
      document.getElementById("manual-link").href = target;
    })();
  </script>
</body>
</html>
